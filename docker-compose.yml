version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: honeypot_db
    environment:
      POSTGRES_USER: honeypot_user
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: honeypot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: honeypot_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      # Ensure this matches the db service configuration above
      DATABASE_URL: postgresql+asyncpg://honeypot_user:securepassword123@db:5432/honeypot_db
      ADMIN_API_KEY: super-secret-admin-token-change-me
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
